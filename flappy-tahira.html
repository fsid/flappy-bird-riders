<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Tahira</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --game-width: 360;
  --game-height: 600;
  --game-ratio: calc(var(--game-width) / var(--game-height));
}
html, body {
  width: 100%;
  height: 100%;
}
body {
  background: #111827;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  min-height: 100vh;
  overflow: hidden;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 3px solid #374151;
  box-shadow: 0 0 48px rgba(112, 197, 206, 0.25);
  cursor: pointer;
  touch-action: none;
  width: min(92vw, calc((100vh - 24px) * 0.6), 420px);
  aspect-ratio: var(--game-ratio);
  height: auto;
  max-height: calc(100vh - 24px);
}
</style>
</head>
<body>
<canvas id="c" width="360" height="600"></canvas>
<script>
// ── Setup ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let activeCtx = ctx;   // swapped during icon generation

const W = 360, H = 600;
const GROUND     = H - 62;
const GRAVITY    = 0.46;
const FLAP_VEL   = -8.4;
const BOOK_W     = 52;
const BOOK_GAP   = 144;
const BOOK_SPD   = 2.4;
const BOOK_INT   = 1800;   // ms between spawns
const BIRD_X     = 70;     // fixed horizontal position (left edge of bird)
const BIRD_W     = 34;
const BIRD_H     = 24;

function loadBestScore(key) {
  try {
    const raw = window.localStorage?.getItem(key);
    const num = Number(raw);
    return Number.isFinite(num) ? num : 0;
  } catch {
    return 0;
  }
}

function saveBestScore(key, value) {
  try {
    window.localStorage?.setItem(key, String(value));
  } catch {
    // iOS file previews and private sessions can block storage.
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let mode      = 'title';   // 'title' | 'play' | 'dead'
let score     = 0;
let best      = loadBestScore('ft_hi');
let tick      = 0;

let by        = H / 2 - BIRD_H / 2;  // top edge of bird body
let bvy       = 0;
let flapTimer = 0;

let pipes     = [];   // { x, gapY, passed }
let nextPipe  = 0;
let groundOff = 0;

const clouds = [
  { x: 50,  y: 75,  w: 72 },
  { x: 240, y: 52,  w: 58 },
  { x: 320, y: 100, w: 50 },
];

const BOOK_COLORS = [
  '#e74c3c','#3498db','#27ae60','#f39c12',
  '#8e44ad','#1abc9c','#e67e22','#c0392b',
  '#2980b9','#e91e63','#16a085','#f1c40f'
];

// ── Audio (Web Audio API — zero external files) ───────────────────────────────
let audioCtx = null;
let muted    = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Core helper: plays one oscillator note with an exponential frequency sweep + gain fade-out
function tone(type, freqStart, freqEnd, gainAmt, dur, when) {
  if (muted || !audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  const t = when ?? audioCtx.currentTime;
  osc.frequency.setValueAtTime(freqStart, t);
  if (freqEnd && freqEnd !== freqStart)
    osc.frequency.exponentialRampToValueAtTime(freqEnd, t + dur);
  gain.gain.setValueAtTime(gainAmt, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

// Wing flap — short upward sweep (square wave chirp)
function sndFlap() {
  ensureAudio();
  tone('square', 370, 540, 0.16, 0.09);
}

// Score point — cheerful two-note chime (C → G)
function sndScore() {
  ensureAudio();
  const t = audioCtx.currentTime;
  tone('square', 523, 523, 0.20, 0.08, t);
  tone('square', 784, 784, 0.20, 0.11, t + 0.08);
}

// Collision impact — buzzy sawtooth thud
function sndHit() {
  ensureAudio();
  tone('sawtooth', 240, 55, 0.40, 0.22);
}

// Death jingle — three descending square-wave notes
function sndDie() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [[392, 0.10], [330, 0.10], [220, 0.18]].forEach(([f, d], i) => {
    tone('square', f, f * 0.80, 0.22, d, t + i * 0.13);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function box(c, x, y, w, h) {
  activeCtx.fillStyle = c;
  activeCtx.fillRect(x|0, y|0, w|0, h|0);
}

function bright(hex, n) {
  const v = parseInt(hex.slice(1), 16);
  const cl = x => Math.min(255, Math.max(0, x));
  return `rgb(${cl((v>>16)+n)},${cl(((v>>8)&255)+n)},${cl((v&255)+n)})`;
}

function roundedRectPath(context, x, y, w, h, r) {
  if (typeof context.roundRect === 'function') {
    context.roundRect(x, y, w, h, r);
    return;
  }
  const rr = Math.max(0, Math.min(r, w / 2, h / 2));
  context.moveTo(x + rr, y);
  context.arcTo(x + w, y, x + w, y + h, rr);
  context.arcTo(x + w, y + h, x, y + h, rr);
  context.arcTo(x, y + h, x, y, rr);
  context.arcTo(x, y, x + w, y, rr);
  context.closePath();
}

function label(text, x, y, size, fill, stroke) {
  activeCtx.font = `bold ${size}px "Courier New",monospace`;
  activeCtx.textAlign = 'center';
  if (stroke) { activeCtx.strokeStyle = stroke; activeCtx.lineWidth = 4; activeCtx.strokeText(text, x, y); }
  activeCtx.fillStyle = fill;
  activeCtx.fillText(text, x, y);
}

// ── Draw character (bird + Tahira) ────────────────────────────────────────────
// bx = left edge of bird body, g = top edge of bird body
//
// Girl sits over the LEFT half of the bird (bx+1..bx+15) so the
// eye (bx+21) and belly (bx+16) are fully clear.
//
// Layer order (back → front):
//   1. Hair behind + tail
//   2. Bird body
//   3. Belly / eye / beak
//   4. Girl — hair, face, compact body
//   5. Bent back arm  (upper-arm down, forearm forward like gripping)
//   6. Bent back leg  (thigh back, shin down, shoe pointing back)
//   7. Wing           (drawn last — always in front of the leg)
//
function drawChar(bx, g, showLabel = true) {

  // ── 1. Behind the bird ───────────────────────────────────────────────────
  box('#0d0d0d', bx-4,  g-14,  6, 20);   // hair flowing behind bird

  box('#c8a000', bx-9,  g+8,  11,  8);   // tail base
  box('#e0b200', bx-7,  g+13,  8,  5);   // tail tip

  // ── 2. Bird body ─────────────────────────────────────────────────────────
  box('#f7c948', bx,   g,        BIRD_W,   BIRD_H);
  box('#f7c948', bx+3, g-2,      BIRD_W-6,  4);   // top arc
  box('#f7c948', bx+3, g+BIRD_H, BIRD_W-6,  3);   // bottom arc

  // ── 3. Bird surface detail (right half — fully clear of girl) ────────────
  box('#fffbd4', bx+16, g+5,  14, 14);             // belly
  box('#ffffff', bx+21, g+3,   9,  9);             // eye white
  box('#111111', bx+23, g+5,   6,  6);             // pupil
  box('#ffffff', bx+25, g+5,   2,  2);             // eye shine
  box('#f08020', bx+BIRD_W, g+7,  10,  5);         // beak top
  box('#c06010', bx+BIRD_W, g+12, 10,  3);         // beak bottom

  // ── 4. Girl — original big head, shifted left 7 px to clear the eye ────────
  //         Body stays compact.  Eye (bx+21) is fully unobstructed.

  // Hair — same pixel counts as the original, just -7 on every x offset
  box('#0d0d0d', bx-2,  g-28, 18,  4);   // crown
  box('#111111', bx-4,  g-24, 22, 17);   // main mass
  box('#0a0a0a', bx-6,  g-13,  6, 17);   // back drape
  box('#0a0a0a', bx+15, g-13,  5, 12);   // front drape (ends bx+20, 1 px before eye)

  // Face  (bx+1 → bx+15 — same 14 px wide as original)
  box('#f5c8a0', bx+1,  g-23, 14, 14);
  box('#0d0d0d', bx+3,  g-22,  4,  2);   // back brow
  box('#0d0d0d', bx+10, g-22,  4,  2);   // front brow
  box('#1a0a00', bx+3,  g-20,  3,  3);   // back eye
  box('#1a0a00', bx+10, g-20,  3,  3);   // front eye
  box('#ffffff', bx+3,  g-20,  1,  1);   // shine
  box('#ffffff', bx+10, g-20,  1,  1);
  box('#c07060', bx+4,  g-14,  6,  2);   // mouth
  box('#f5c8a0', bx+5,  g-10,  5,  8);   // neck (tall enough to bridge to dress)

  // Dress — compact torso only, no big skirt
  box('#c0304a', bx+1,  g-2,  12,  7);   // torso
  box('#a02040', bx-1,  g-1,   4,  6);   // back sleeve cap

  // ── 5. Bent back arm — upper arm ↓ then forearm → (gripping forward) ────
  box('#f5c8a0', bx-1,  g+4,   3,  5);   // upper arm going down
  box('#f5c8a0', bx-1,  g+8,   8,  3);   // forearm going right (forward)
  box('#f5c8a0', bx+6,  g+6,   3,  4);   // hand gripping

  // ── 6. Bent back leg — thigh ← then shin ↓ then shoe ← (tuck-back) ─────
  box('#2255aa', bx+1,  g+5,   6,  4);   // thigh going back under dress
  box('#2255aa', bx-1,  g+9,   4,  5);   // shin going down
  box('#1a1a1a', bx-3,  g+13,  7,  3);   // shoe pointing back

  // ── 7. Wing — drawn last so it overlaps the leg ──────────────────────────
  const wingY = flapTimer > 0 ? g + 6 : g + 14;
  box('#d4a000', bx+1,  wingY,     16, 9);
  box('#c09000', bx+3,  wingY + 2, 10, 5);

  if (showLabel) label('Tahira', bx + 8, g - 34, 10, '#ffffff', '#2c2c2c');
}

// ── Draw book obstacles ───────────────────────────────────────────────────────
const SPINE = 16;

function drawTopBooks(bx, height) {
  // Stacked books from y=0 down to `height`
  for (let y = 0, i = 0; y < height - SPINE*2; y += SPINE, i++) {
    const c = BOOK_COLORS[i % BOOK_COLORS.length];
    box(c,            bx,   y,        BOOK_W, SPINE-1);
    box(bright(c,55), bx+3, y+2,      BOOK_W-6, SPINE-7);
    box('#1a1a1a',    bx,   y+SPINE-1, BOOK_W, 1);
  }
  // Wooden endcap at base of top stack
  box('#5d4037', bx-5, height-SPINE*2, BOOK_W+10, SPINE*2);
  box('#795548', bx-5, height-SPINE*2, BOOK_W+10,  5);
  box('#3e2723', bx-5, height-4,       BOOK_W+10,  4);
}

function drawBotBooks(bx, startY) {
  // Wooden endcap at top of bottom stack
  box('#5d4037', bx-5, startY,            BOOK_W+10, SPINE*2);
  box('#795548', bx-5, startY,            BOOK_W+10,  5);
  box('#3e2723', bx-5, startY+SPINE*2-4,  BOOK_W+10,  4);
  // Stacked books from below endcap down to ground
  for (let y = startY+SPINE*2, i = 0; y < GROUND; y += SPINE, i++) {
    const c = BOOK_COLORS[(i+5) % BOOK_COLORS.length];
    box(c,            bx,   y,        BOOK_W, SPINE-1);
    box(bright(c,55), bx+3, y+2,      BOOK_W-6, SPINE-7);
    box('#1a1a1a',    bx,   y+SPINE-1, BOOK_W, 1);
  }
}

// ── Draw scenery ──────────────────────────────────────────────────────────────
function drawSky() {
  box('#70c5ce', 0,  0,  W, H);
  box('#a8dde6', 0,  0,  W, 90);
  box('#84ccd8', 0, 70,  W, 35);
}

function drawCloud(x, y, w) {
  box('#f4faff', x + (w*0.2)|0, y,    (w*0.6)|0, 11);
  box('#f4faff', x,             y+8,  w,         15);
  box('#ddeefa', x+4,           y+10, w-8,       11);
}

function drawGround() {
  box('#5b8a3b', 0, GROUND,     W,  8);
  box('#4a7030', 0, GROUND+6,   W,  5);
  box('#c8a555', 0, GROUND+11,  W, H-GROUND-11);
  // Scrolling dirt texture
  const off = ((-groundOff % 28) + 28) % 28;
  for (let gx = off - 28; gx < W; gx += 28) {
    box('#b89440', gx|0, GROUND+17, 14, 4);
  }
}

// ── Physics / logic ───────────────────────────────────────────────────────────
function tap() {
  ensureAudio();                         // resume AudioContext on any user gesture
  if (mode === 'title') {
    mode      = 'play';
    bvy       = FLAP_VEL;
    flapTimer = 10;
    nextPipe  = Date.now() + 600;
    sndFlap();
  } else if (mode === 'play') {
    bvy       = FLAP_VEL;
    flapTimer = 10;
    sndFlap();
  } else if (mode === 'dead') {
    restart();
  }
}

function restart() {
  by        = H / 2 - BIRD_H / 2;
  bvy       = 0;
  flapTimer = 0;
  pipes     = [];
  score     = 0;
  tick      = 0;
  groundOff = 0;
  mode      = 'title';
}

function update() {
  tick++;

  // Bird physics runs in both 'play' and 'dead' modes
  if (mode === 'play' || mode === 'dead') {
    bvy += GRAVITY;
    by  += bvy;
    if (flapTimer > 0) flapTimer--;
  }

  // Clamp to ground when dead (fall-and-thud effect)
  if (mode === 'dead') {
    if (by + BIRD_H >= GROUND) { by = GROUND - BIRD_H; bvy = 0; }
    return;
  }
  if (mode !== 'play') return;

  groundOff += BOOK_SPD;

  // Scroll clouds
  clouds.forEach(c => {
    c.x -= 0.35;
    if (c.x + c.w < 0) c.x = W + 10;
  });

  // Spawn obstacles
  if (Date.now() > nextPipe) {
    const gapY = 90 + Math.random() * (GROUND - BOOK_GAP - 120);
    pipes.push({ x: W + 10, gapY, passed: false });
    nextPipe = Date.now() + BOOK_INT;
  }

  // Move obstacles + score
  pipes.forEach(p => {
    p.x -= BOOK_SPD;
    if (!p.passed && p.x + BOOK_W < BIRD_X) {
      p.passed = true;
      score++;
      sndScore();
      if (score > best) { best = score; saveBestScore('ft_hi', best); }
    }
  });
  pipes = pipes.filter(p => p.x + BOOK_W > -20);

  if (checkCollide()) {
    mode = 'dead';
    sndHit();
    setTimeout(sndDie, 180);
  }
}

function checkCollide() {
  // Ground / ceiling
  if (by + BIRD_H >= GROUND) return true;
  if (by - 20 <= 0)          return true;

  // Slightly inset hitbox for fair play
  const left  = BIRD_X + 4;
  const right = BIRD_X + BIRD_W - 4;
  const top   = by - 12;       // just below Tahira's chin area
  const bot   = by + BIRD_H - 2;

  for (const p of pipes) {
    if (right > p.x + 3 && left < p.x + BOOK_W - 3) {
      if (top < p.gapY)              return true;
      if (bot > p.gapY + BOOK_GAP)  return true;
    }
  }
  return false;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  drawSky();
  clouds.forEach(c => drawCloud(c.x, c.y, c.w));

  pipes.forEach(p => {
    drawTopBooks(p.x, p.gapY);
    drawBotBooks(p.x, p.gapY + BOOK_GAP);
  });

  drawGround();
  drawChar(BIRD_X, by);

  // Score
  if (mode === 'play' || mode === 'dead') {
    label(score, W/2, 52, 32, '#ffffff', '#2c2c2c');
  }

  // Mute button (always visible, top-right)
  drawMuteBtn();

  // ── Title screen ──
  if (mode === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);

    label('FLAPPY', W/2, H/2 - 58, 40, '#ffffff', '#1a1a1a');
    label('TAHIRA', W/2, H/2 -  8, 40, '#f7c948', '#1a1a1a');

    const p = 0.65 + 0.35 * Math.sin(tick * 0.065);
    ctx.globalAlpha = p;
    label('SPACE  /  tap  to  play', W/2, H/2 + 42, 14, '#ffffff');
    ctx.globalAlpha = 1;
    if (best > 0) label('Best: ' + best, W/2, H/2 + 70, 13, '#f7c948');
  }

  // ── Game over screen ──
  if (mode === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    ctx.fillRect(0, 0, W, H);

    const px = W/2 - 118, py = H/2 - 98;
    // Panel
    box('#f7c948', px,     py,     236, 196);
    box('#e8a000', px,     py,     236,   7);
    box('#e8a000', px,     py+189, 236,   7);
    box('#c88000', px,     py+7,     5, 182);
    box('#c88000', px+231, py+7,     5, 182);

    label('GAME  OVER', W/2, py + 50,  22, '#1a1a1a');

    // Score rows
    label('Score :  ' + score, W/2, py + 90,  16, '#333333');
    label('Best  :  ' + best,  W/2, py + 116, 16, '#333333');

    const p2 = 0.65 + 0.35 * Math.sin(tick * 0.09);
    ctx.globalAlpha = p2;
    label('Space / tap to retry', W/2, py + 162, 13, '#333333');
    ctx.globalAlpha = 1;
  }
}

// ── Mute button ───────────────────────────────────────────────────────────────
const MUTE_X = W - 38, MUTE_Y = 8, MUTE_S = 28;

function drawMuteBtn() {
  // Background pill
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  roundedRectPath(ctx, MUTE_X, MUTE_Y, MUTE_S, MUTE_S, 6);
  ctx.fill();
  // Icon (pixel speaker drawn with rects)
  const ix = MUTE_X + 7, iy = MUTE_Y + 8;
  box('#ffffff', ix,   iy+2, 4, 8);   // speaker body
  box('#ffffff', ix+4, iy,   4, 12);  // speaker cone
  if (!muted) {
    // Sound waves
    box('#ffffff', ix+10, iy+2, 2, 2);
    box('#ffffff', ix+10, iy+8, 2, 2);
    box('#ffffff', ix+13, iy,   2, 4);
    box('#ffffff', ix+13, iy+8, 2, 4);
  } else {
    // X mark
    box('#ff6666', ix+10, iy+2,  8, 2);
    box('#ff6666', ix+10, iy+8,  8, 2);
    box('#ff6666', ix+14, iy+4,  2, 4);
    box('#ff6666', ix+10, iy+4,  2, 4);
  }
}

function isMuteBtn(mx, my) {
  return mx >= MUTE_X && mx <= MUTE_X + MUTE_S &&
         my >= MUTE_Y && my <= MUTE_Y + MUTE_S;
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') { muted = !muted; return; }
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); tap(); }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top)  * (H / rect.height);
  if (isMuteBtn(mx, my)) { muted = !muted; return; }
  tap();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (W / rect.width);
  const my = (touch.clientY - rect.top)  * (H / rect.height);
  if (isMuteBtn(mx, my)) { muted = !muted; return; }
  tap();
}, { passive: false });

const PWA = {
  name: 'Flappy Tahira',
  shortName: 'Flappy Tahira',
  description: 'Fly through books with Tahira!',
  startUrl: './flappy-tahira.html',
  themeColor: '#70c5ce',
  backgroundColor: '#111827',
  appId: 'flappy-tahira',
  iconTouchTitle: 'Flappy Tahira',
  swUrl: './sw.js',
};

// Draws the Tahira+bird pixel-art icon onto an offscreen canvas and returns a data URL.
function generateIcon(size) {
  const ic = document.createElement('canvas');
  ic.width = ic.height = size;
  const ictx = ic.getContext('2d');
  ictx.imageSmoothingEnabled = false;

  // Sky-blue gradient background
  const grad = ictx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0,   '#a8dde6');
  grad.addColorStop(0.7, '#70c5ce');
  grad.addColorStop(1,   '#5bbbc8');
  ictx.fillStyle = grad;
  ictx.fillRect(0, 0, size, size);

  // Integer pixel scale: 512→8×, 192→3×, 64→1×
  const SCALE = Math.max(1, Math.round(size / 64));

  // Character natural bounds (no label):
  //   X: bx-9  …  bx+44  (53 px wide),  centre = bx+17.5
  //   Y: g-28  …  g+25   (53 px tall),  centre = g-1.5
  // We want that centre at (size/2, size/2) in canvas pixels:
  const bx = Math.round(size / 2 / SCALE - 17.5);
  const g  = Math.round(size / 2 / SCALE +  1.5);

  activeCtx = ictx;
  ictx.save();
  ictx.scale(SCALE, SCALE);
  drawChar(bx, g, false);   // false = skip floating "Tahira" text
  ictx.restore();
  activeCtx = ctx;

  return ic.toDataURL('image/png');
}

function setMeta(name, content) {
  const existing = document.querySelector(`meta[name="${name}"]`);
  if (existing) {
    existing.setAttribute('content', content);
    return;
  }
  const meta = document.createElement('meta');
  meta.name = name;
  meta.content = content;
  document.head.appendChild(meta);
}

function setupPWA() {
  const icon512 = generateIcon(512);
  const icon192 = generateIcon(192);
  const icon64  = generateIcon(64);   // favicon

  const manifest = {
    name: PWA.name,
    short_name: PWA.shortName,
    description: PWA.description,
    id: PWA.appId,
    start_url: PWA.startUrl,
    scope: './',
    display: 'fullscreen',
    orientation: 'portrait',
    background_color: PWA.backgroundColor,
    theme_color: PWA.themeColor,
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };

  const existingManifest = document.querySelector('link[rel="manifest"]');
  if (existingManifest) existingManifest.remove();
  const mLink = document.createElement('link');
  mLink.rel = 'manifest';
  mLink.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
  document.head.appendChild(mLink);

  setMeta('viewport', 'width=device-width, initial-scale=1, viewport-fit=cover');
  setMeta('theme-color', PWA.themeColor);
  setMeta('apple-mobile-web-app-capable', 'yes');
  setMeta('apple-mobile-web-app-status-bar-style', 'black-translucent');
  setMeta('apple-mobile-web-app-title', PWA.iconTouchTitle);

  // Apple touch icon (shortcut tile image on iOS)
  const al = document.createElement('link');
  al.rel = 'apple-touch-icon';
  al.href = icon192;
  document.head.appendChild(al);

  // Browser tab/favicon icon
  const fl = document.createElement('link');
  fl.rel = 'icon';
  fl.type = 'image/png';
  fl.href = icon64;
  document.head.appendChild(fl);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(PWA.swUrl).catch(() => {});
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

setupPWA();   // inject icon + manifest before first frame
loop();
</script>
</body>
</html>
